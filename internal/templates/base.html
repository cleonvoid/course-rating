{{define "head"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.}} | Course Rating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
    :root {
        --bg:           #F7F6F2;
        --surface:      #FFFFFF;
        --ink:          #0E0E0B;
        --ink-2:        #6A6A64;
        --ink-3:        #AEADA7;
        --border:       #E4E1D8;
        --amber:        #C07D0A;
        --amber-pale:   #FDF5E4;
        --sage:         #2B5C3F;
        --sage-light:   #EAF2EE;
        --radius:       12px;
        --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
        --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ─────────────────────────────────── */
    .site-nav {
        background: var(--ink);
        padding: 0 2rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .nav-brand {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1.2rem;
        color: #fff;
        text-decoration: none;
        letter-spacing: -0.01em;
        transition: color 0.15s;
    }
    .nav-brand:hover { color: var(--amber); }

    .nav-user { display: flex; align-items: center; gap: 1rem; }

    .nav-greeting {
        font-size: 0.8rem;
        color: #888;
    }

    .btn-ghost {
        background: transparent;
        border: 1px solid #3A3A38;
        color: #AAA;
        padding: 0.28rem 0.8rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: 'Inter', sans-serif;
        text-decoration: none;
        transition: border-color 0.15s, color 0.15s;
        line-height: 1.6;
    }
    .btn-ghost:hover { border-color: #888; color: #fff; }

    /* ── LAYOUT ──────────────────────────────── */
    .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 0 1.5rem;
    }

    /* ── COURSE LIST PAGE ────────────────────── */
    .page-hero {
        padding: 3.5rem 0 1.75rem;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 2px solid var(--ink);
        margin-bottom: 0;
    }

    .page-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2rem, 5vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1;
    }

    .page-count {
        font-size: 0.75rem;
        color: var(--ink-3);
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
        padding-bottom: 0.2rem;
    }

    .course-list { list-style: none; }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .course-item {
        position: relative;
        border-bottom: 1px solid var(--border);
        animation: slideUp 0.35s ease backwards;
    }
    .course-item:nth-child(1) { animation-delay: 0.04s; }
    .course-item:nth-child(2) { animation-delay: 0.08s; }
    .course-item:nth-child(3) { animation-delay: 0.12s; }
    .course-item:nth-child(4) { animation-delay: 0.16s; }
    .course-item:nth-child(5) { animation-delay: 0.20s; }

    /* Amber accent bar */
    .course-item::before {
        content: '';
        position: absolute;
        left: -1.5rem;
        top: 0;
        height: 100%;
        width: 3px;
        background: var(--amber);
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 0 2px 2px 0;
    }
    .course-item:hover::before { transform: scaleY(1); }

    .course-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
        padding: 1.75rem 0;
        text-decoration: none;
        color: inherit;
    }

    .course-info {
        min-width: 0;
        flex: 1;
        transition: transform 0.2s ease;
    }
    .course-item:hover .course-info { transform: translateX(8px); }

    .course-name {
        font-family: 'Playfair Display', serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.3;
        margin-bottom: 0.3rem;
        transition: color 0.15s;
    }
    .course-item:hover .course-name { color: var(--sage); }

    .course-instructor { font-size: 0.8rem; color: var(--ink-3); }

    .course-score { text-align: right; flex-shrink: 0; }

    .score-value {
        display: block;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.9rem;
        font-weight: 500;
        color: var(--amber);
        line-height: 1;
        letter-spacing: -0.02em;
    }

    .score-stars {
        display: block;
        font-size: 0.6rem;
        letter-spacing: 2px;
        color: var(--amber);
        margin-top: 0.25rem;
        opacity: 0.7;
    }

    .score-count {
        display: block;
        font-size: 0.7rem;
        color: var(--ink-3);
        margin-top: 0.1rem;
        font-variant-numeric: tabular-nums;
    }

    /* ── COURSE DETAIL PAGE ──────────────────── */
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--ink-2);
        text-decoration: none;
        font-size: 0.82rem;
        margin: 2rem 0 1.25rem;
        transition: color 0.15s;
    }
    .back-link:hover { color: var(--ink); }

    .course-article {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 3rem;
    }

    .course-header {
        padding: 2.5rem 2.75rem 2rem;
        border-bottom: 1px solid var(--border);
    }

    .course-eyebrow {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 0.8rem;
    }

    .course-article-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.2;
        margin-bottom: 0.65rem;
    }

    .course-article-by {
        font-size: 0.85rem;
        color: var(--ink-2);
    }
    .course-article-by strong { color: var(--ink); font-weight: 500; }

    .course-body {
        padding: 1.75rem 2.75rem;
        border-bottom: 1px solid var(--border);
    }

    .course-desc {
        font-size: 0.95rem;
        line-height: 1.75;
        color: var(--ink-2);
        max-width: 58ch;
    }

    /* Stats bar */
    .course-stats-bar {
        padding: 1.5rem 2.75rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
    }

    .stat-block { }

    .stat-big {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.8rem;
        font-weight: 500;
        color: var(--amber);
        line-height: 1;
        display: block;
    }

    .stat-stars-row {
        font-size: 0.6rem;
        letter-spacing: 2px;
        color: var(--amber);
        display: block;
        margin-top: 0.25rem;
        opacity: 0.8;
    }

    .stat-caption {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-3);
        display: block;
        margin-top: 0.25rem;
    }

    .stat-rule {
        width: 1px;
        height: 36px;
        background: var(--border);
        flex-shrink: 0;
    }

    /* ── ENROLL SECTION ──────────────────────── */
    .enroll-section { padding: 2rem 2.75rem; }

    .enroll-notice {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 1rem 1.25rem;
        border-radius: 8px;
        font-size: 0.88rem;
        color: var(--ink-2);
        border: 1px solid var(--border);
        background: var(--bg);
    }
    .enroll-notice a { color: var(--sage); text-decoration: none; font-weight: 500; }
    .enroll-notice a:hover { text-decoration: underline; }

    .btn-enroll {
        display: inline-block;
        background: var(--sage);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.1rem;
        font-size: 0.88rem;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        flex-shrink: 0;
        letter-spacing: 0.01em;
    }
    .btn-enroll:hover { background: #1d4229; transform: translateY(-1px); }
    .btn-enroll:active { transform: translateY(0); }

    /* ── STAR RATING WIDGET ──────────────────── */
    .star-rating-widget { }

    .widget-rating-row {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
    }

    .widget-avg {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 2.2rem;
        font-weight: 500;
        color: var(--amber);
        line-height: 1;
    }

    .widget-stars-text {
        font-size: 0.75rem;
        letter-spacing: 3px;
        color: var(--amber);
        opacity: 0.75;
    }

    .widget-count {
        font-size: 0.78rem;
        color: var(--ink-3);
        font-variant-numeric: tabular-nums;
    }

    .rate-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 0.6rem;
    }

    .stars-input {
        display: flex;
        flex-direction: row-reverse;
        width: fit-content;
    }

    .stars-input input[type="radio"] { display: none; }

    .stars-input label {
        font-size: 2.5rem;
        color: #DDD;
        cursor: pointer;
        padding: 0 0.1rem;
        transition: color 0.1s, transform 0.12s;
        line-height: 1;
        user-select: none;
    }
    .stars-input label:hover { transform: scale(1.18); }

    .stars-input input[type="radio"]:checked ~ label,
    .stars-input label:hover,
    .stars-input label:hover ~ label { color: var(--amber); }

    .feedback {
        margin-top: 0.6rem;
        font-size: 0.8rem;
        color: var(--ink-3);
        min-height: 1.25rem;
    }

    /* HTMX loading */
    form.htmx-request button,
    form.htmx-request .btn-enroll { opacity: 0.5; pointer-events: none; }

    /* ── SIGN-IN PAGE ────────────────────────── */
    .auth-wrapper {
        min-height: calc(100vh - 56px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
    }

    .auth-card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
    }

    .auth-wordmark {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 1rem;
        color: var(--ink-3);
        margin-bottom: 2rem;
        display: block;
    }

    .auth-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 0.3rem;
    }

    .auth-sub {
        font-size: 0.82rem;
        color: var(--ink-2);
        margin-bottom: 2rem;
        line-height: 1.5;
    }

    .form-group { margin-bottom: 0.9rem; }

    .form-group label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--ink-2);
        margin-bottom: 0.3rem;
        letter-spacing: 0.03em;
    }

    .form-group input {
        width: 100%;
        padding: 0.55rem 0.8rem;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        font-size: 0.92rem;
        font-family: 'Inter', sans-serif;
        color: var(--ink);
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .form-group input:focus {
        border-color: var(--sage);
        background: #fff;
        box-shadow: 0 0 0 3px var(--sage-light);
    }

    .btn-primary {
        width: 100%;
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.65rem;
        font-size: 0.92rem;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        letter-spacing: 0.01em;
        transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #1f1f1c; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .form-error {
        font-size: 0.8rem;
        color: #C0392B;
        margin-bottom: 0.6rem;
        min-height: 1.1rem;
    }

    .demo-panel {
        margin-top: 1.75rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
    }

    .demo-eyebrow {
        font-size: 0.67rem;
        font-weight: 600;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 0.75rem;
    }

    .demo-list { display: grid; gap: 0.4rem; }

    .demo-entry {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.77rem;
        gap: 0.75rem;
    }
    .demo-email { color: var(--ink-2); }
    .demo-pw {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        color: var(--ink-3);
    }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 600px) {
        .page-hero { padding-top: 2rem; flex-direction: column; gap: 0.3rem; }
        .course-link { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
        .course-score { text-align: left; }
        .course-header, .course-body, .course-stats-bar, .enroll-section {
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
        .site-nav { padding: 0 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
        .course-item { animation: none; }
        *, *::before, *::after { transition-duration: 0s !important; }
    }
    </style>
</head>
{{end}}

{{define "nav"}}
<nav class="site-nav">
    <a class="nav-brand" href="/">Course Rating</a>
    <div class="nav-user">
        {{if .}}
        <span class="nav-greeting">{{.Name}}</span>
        <form method="POST" action="/signout" style="margin:0">
            <button type="submit" class="btn-ghost">Sign out</button>
        </form>
        {{else}}
        <a class="btn-ghost" href="/signin">Sign in</a>
        {{end}}
    </div>
</nav>
{{end}}

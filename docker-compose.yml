services:
  db:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: course_rating
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_rating"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/course_rating?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
